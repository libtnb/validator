name: Test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        go: [ "oldstable", "stable" ]
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: ${{ matrix.go }}
      - name: Install dependencies
        run: go mod tidy
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - run: go test -race ./...
      - name: Benchmarks (smoke)
        run: go test -run '^$' -bench=. -benchmem ./...
      - name: DSL fuzz (short)
        run: |
          go test -run '^$' -fuzz=FuzzParse -fuzztime=30s .
          go test -run '^$' -fuzz=FuzzSplitDive -fuzztime=30s ./internal/dsl/
